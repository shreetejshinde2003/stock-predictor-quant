name: Algothink Research Pipeline

on:
  schedule:
    - cron: '15 3 * * 1-5'
    - cron: '15 10 * * 1-5'

  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-research-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run Production Pipeline
        env:
          TZ: Asia/Kolkata
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python production_pipeline.py --mode hunt
          elif [ "${{ github.event.schedule }}" = "15 3 * * 1-5" ]; then
            python production_pipeline.py --mode hunt
          elif [ "${{ github.event.schedule }}" = "15 10 * * 1-5" ]; then
            python production_pipeline.py --mode audit
          fi

      - name: Commit and Push JSON Memory
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          touch signals.json lesson_ledger.json

          git add signals.json lesson_ledger.json

          if git diff --staged --quiet; then
            echo "No market-memory changes detected."
          else
            git commit -m "🤖 Auto-update: Morning/Evening AI Engine Scan"
            git pull --rebase origin main
            git push origin main
          fi
