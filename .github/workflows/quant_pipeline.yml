name: Quant Prediction Engine Brain

on:
  schedule:
    # 03:15 UTC corresponds to exactly 8:45 AM Indian Standard Time (IST)
    - cron: '15 3 * * 1-5'
  workflow_dispatch: # Allows you to manually click a button to run it anytime

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    # 1. Spin up a clean Linux Virtual Machine container environment
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    # 2. Deploy Python version 3.13 onto the server
    - name: Set Up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
        cache: 'pip' # Speeds up future daily automated script run pipelines

    # 3. Inject all necessary computing packages smoothly 
    - name: Install Quant Core Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install yfinance pandas numpy tslearn scikit-learn scipy gspread google-auth

    # 4. Reconstruct your secure Google cloud credentials on the cloud fly
    - name: De-serialize Google API Credentials Key File
      run: |
        echo "${{ secrets.GOOGLE_CREDENTIALS_JSON }}" > google_credentials.json

    # 5. Ignite your integrated Case-Based Reasoning Chaos Scanner Engine
    - name: Execute Live Production Pipeline
      run: |
        python production_pipeline.py

    # 6. Commit the updated database memory back to GitHub safely
    - name: Push Market Memory Updates Back to Repository
      run: |
        git config --global user.name "Quant Engine Automation"
        git config --global user.email "actions@github.com"
        git add market_memory.db
        git diff-index --quiet HEAD || git commit -m "Automated Sync: 15-Year Market Memory Matrix Cache [Skip CI]"
        git push
