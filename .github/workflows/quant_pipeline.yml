name: Master Autonomous Pipeline

on:
  schedule:
    # 8:45 AM IST = 3:15 AM UTC (Monday to Friday)
    - cron: '45 3 * * 1-5'
    # 3:45 PM IST = 10:15 AM UTC (Monday to Friday)
    - cron: '45 10 * * 1-5'
  workflow_dispatch: # This adds a manual "Play" button so we can test it now

permissions:
  contents: write # CRITICAL: Allows the bot to save JSON memory back to the repo

jobs:
  run-chaos-engine:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install pandas yfinance numpy ta

      - name: Run Production Pipeline
        run: python production_pipeline.py

      - name: Commit and Push JSON Memory
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add signals.json lesson_ledger.json
          git diff --quiet && git diff --staged --quiet || git commit -m "🤖 Auto-update: Morning/Evening AI Engine Scan"
          git push
